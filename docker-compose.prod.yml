services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-bolsas}
      POSTGRES_USER: ${DB_USER:-bolsas}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    secrets:
      - db_password
    networks:
      - public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  rabbitmq:
    image: rabbitmq:3-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-bolsas}
      RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-bolsas}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    secrets:
      - rabbitmq_password
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  web:
    image: ${REGISTRY:-localhost:5000}/bolsas:${TAG:-latest}
    env_file: .env.prod
    environment:
      SECRET_KEY_FILE: /run/secrets/secret_key
      DB_PASSWORD_FILE: /run/secrets/db_password
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      GOOGLE_API_KEY_FILE: /run/secrets/google_api_key
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
    secrets:
      - secret_key
      - db_password
      - openai_api_key
      - google_api_key
      - rabbitmq_password
    volumes:
      - media_data:/app/media
    networks:
      - public
    deploy:
      replicas: 2
      labels:
        - traefik.enable=true
        - traefik.http.routers.bolsas.rule=Host(`${DOMAIN}`)
        - traefik.http.routers.bolsas.entrypoints=websecure
        - traefik.http.routers.bolsas.tls=true
        - traefik.http.routers.bolsas.tls.certresolver=le
        - traefik.http.routers.bolsas.tls.domains[0].main=${DOMAIN}
        - traefik.http.routers.bolsas.tls.domains[0].sans=*.${DOMAIN}
        - traefik.http.services.bolsas.loadbalancer.server.port=8000
        - traefik.http.services.bolsas.loadbalancer.healthcheck.path=/health/
        - traefik.http.services.bolsas.loadbalancer.healthcheck.interval=10s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  celery:
    image: ${REGISTRY:-localhost:5000}/bolsas:${TAG:-latest}
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    env_file: .env.prod
    environment:
      SECRET_KEY_FILE: /run/secrets/secret_key
      DB_PASSWORD_FILE: /run/secrets/db_password
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      GOOGLE_API_KEY_FILE: /run/secrets/google_api_key
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
    secrets:
      - secret_key
      - db_password
      - openai_api_key
      - google_api_key
      - rabbitmq_password
    networks:
      - public
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  celery-beat:
    image: ${REGISTRY:-localhost:5000}/bolsas:${TAG:-latest}
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    env_file: .env.prod
    environment:
      SECRET_KEY_FILE: /run/secrets/secret_key
      DB_PASSWORD_FILE: /run/secrets/db_password
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      GOOGLE_API_KEY_FILE: /run/secrets/google_api_key
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
    secrets:
      - secret_key
      - db_password
      - openai_api_key
      - google_api_key
      - rabbitmq_password
    networks:
      - public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  traefik:
    image: traefik:v3.2
    command:
      - sh
      - -c
      - |
        export CF_DNS_API_TOKEN=$$(cat /run/secrets/cf_dns_api_token)
        exec traefik \
          --api.dashboard=false \
          --ping=true \
          --providers.docker=true \
          --providers.docker.swarmmode=true \
          --providers.docker.exposedbydefault=false \
          --providers.docker.network=public \
          --entrypoints.web.address=:80 \
          --entrypoints.web.http.redirections.entryPoint.to=websecure \
          --entrypoints.web.http.redirections.entryPoint.scheme=https \
          --entrypoints.web.http.redirections.entryPoint.permanent=true \
          --entrypoints.websecure.address=:443 \
          --certificatesresolvers.le.acme.dnschallenge=true \
          --certificatesresolvers.le.acme.dnschallenge.provider=cloudflare \
          --certificatesresolvers.le.acme.email=${ACME_EMAIL} \
          --certificatesresolvers.le.acme.storage=/acme/acme.json \
          --certificatesresolvers.le.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53 \
          --log.level=INFO \
          --accesslog=true
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
    secrets:
      - cf_dns_api_token
    networks:
      - public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

networks:
  public:
    driver: overlay
    attachable: true

volumes:
  pgdata:
  redis_data:
  rabbitmq_data:
  traefik_acme:

secrets:
  secret_key:
    file: .secrets/secret_key.txt
  db_password:
    file: .secrets/db_password.txt
  openai_api_key:
    file: .secrets/openai_api_key.txt
  google_api_key:
    file: .secrets/google_api_key.txt
  rabbitmq_password:
    file: .secrets/rabbitmq_password.txt
  cf_dns_api_token:
    file: .secrets/cf_dns_api_token.txt
