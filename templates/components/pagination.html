{% if is_paginated %}
<nav class="mt-4">
    <ul class="pagination justify-content-center">
        {% if page_obj.has_previous %}
        <li class="page-item">
            <a class="page-link" href="?{% if pagination_param %}{{ pagination_param }}&{% endif %}page={{ page_obj.previous_page_number }}">Anterior</a>
        </li>
        {% endif %}
        {% for num in page_obj.paginator.page_range %}
        <li class="page-item {% if page_obj.number == num %}active{% endif %}">
            <a class="page-link" href="?{% if pagination_param %}{{ pagination_param }}&{% endif %}page={{ num }}">{{ num }}</a>
        </li>
        {% endfor %}
        {% if page_obj.has_next %}
        <li class="page-item">
            <a class="page-link" href="?{% if pagination_param %}{{ pagination_param }}&{% endif %}page={{ page_obj.next_page_number }}">Proximo</a>
        </li>
        {% endif %}
    </ul>
</nav>
{% endif %}
