{% load static %}
<nav id="sidebar" class="shadow-sm">

    </a>

    <div class="sidebar-nav">
        <div class="sidebar-section">Principal</div>
        <a href="{% url 'home' %}" class="sidebar-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">

        </a>
        <a href="{% if has_cadastro %}{% url 'cadastro_detail' %}{% else %}{% url 'cadastro_create' %}{% endif %}" class="sidebar-link">

        </a>

        <div class="sidebar-section">Bolsas</div>
