<td colspan="7">
    <div class="card border-info m-2">
        <div class="card-header bg-info text-white py-1 d-flex justify-content-between align-items-center">
            <span class="small fw-medium"><i class="bi bi-robot me-1"></i>Analise IA</span>
            <span class="badge bg-white text-info small">Groq</span>
        </div>
        <div class="card-body py-2 px-3">
            <div class="row align-items-center g-3">
                <div class="col-md-2 text-center">
                    <div class="display-6 fw-bold mb-0 {% if compatibilidade and compatibilidade >= 70 %}text-success{% elif compatibilidade and compatibilidade >= 40 %}text-warning{% else %}text-danger{% endif %}">
                        {{ compatibilidade|default:'?' }}<small class="fs-6">%</small>
                    </div>
                    <div class="small text-muted">compatibilidade</div>
                    {% if nota is not None %}
                    <div class="mt-2">
                        <span class="badge bg-primary fs-6">{{ nota|floatformat:1 }}</span>
                        <div class="small text-muted">nota sugerida</div>
                    </div>
                    {% endif %}
                </div>
                <div class="col-md-10">
                    <p class="mb-0 small" style="line-height:1.6">{{ resumo }}</p>
                </div>
            </div>
        </div>
    </div>
</td>
