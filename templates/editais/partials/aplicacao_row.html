<tr>
    <td>
        <a href="{% url 'edital_detail' a.edital.pk %}" class="text-decoration-none fw-medium">
            {{ a.edital.nome_edital }}
        </a>
    </td>
    {% if eh_gestor %}
    <td>{{ a.bolsista.user.nome_completo }}</td>
    {% endif %}
    <td class="text-muted small">{{ a.data_aplicacao|date:'d/m/Y H:i' }}</td>
    <td>
        <span class="badge {% if a.status == 'aprovado' %}bg-success{% elif a.status == 'rejeitado' %}bg-danger{% elif a.status == 'em_analise' %}bg-info text-dark{% else %}bg-warning text-dark{% endif %}">
            {{ a.get_status_display }}
        </span>
    </td>
    <td class="text-end"></td>
</tr>
