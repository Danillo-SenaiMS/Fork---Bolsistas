<div class="p-3">
    <h6 class="fw-semibold text-primary mb-2">
        <i class="bi bi-stars me-2"></i>Resumo do Edital
    </h6>
    <p class="mb-3">{{ resumo }}</p>

    <h6 class="fw-semibold text-primary mb-2">
        <i class="bi bi-binoculars me-2"></i>Análise frente aos Bolsistas
    </h6>
    <p class="mb-3">{{ analise }}</p>

    {% if radar %}
    <h6 class="fw-semibold text-primary mb-2">
        <i class="bi bi-bar-chart me-2"></i>Compatibilidade dos Candidatos
    </h6>
    <div class="table-responsive">
        <table class="table table-sm table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Candidato</th>
                    <th class="text-end" style="width: 120px;">Compatibilidade</th>
                    <th style="width: 50%;">Barra</th>
                </tr>
            </thead>
            <tbody>
                {% for item in radar %}
                <tr>
                    <td class="fw-medium small">{{ item.bolsista }}</td>
                    <td class="text-end fw-bold small {% if item.score >= 70 %}text-success{% elif item.score >= 40 %}text-warning{% else %}text-danger{% endif %}">
                        {{ item.score }}%
                    </td>
                    <td>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar {% if item.score >= 70 %}bg-success{% elif item.score >= 40 %}bg-warning{% else %}bg-danger{% endif %}"
                                 role="progressbar" style="width: {{ item.score }}%;"
                                 aria-valuenow="{{ item.score }}" aria-valuemin="0" aria-valuemax="100">
                            </div>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% endif %}
</div>
