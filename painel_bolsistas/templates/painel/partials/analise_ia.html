{% if erro %}
<div class="alert alert-danger">
    <i class="bi bi-exclamation-triangle me-1"></i>{{ erro }}
</div>
{% elif analise %}
<div class="analise-content" style="white-space: pre-wrap; line-height: 1.7;">
{{ analise }}
</div>
{% else %}
<div class="alert alert-warning">
    <i class="bi bi-exclamation-circle me-1"></i>Nao foi possivel gerar a analise. Verifique a chave GROQ_API_KEY.
</div>
{% endif %}
